name: koala
description: "A Google Keep Notes clone built with Flutter"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.5.3
  palette_generator: ^0.3.3+7
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
